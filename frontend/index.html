<!DOCTYPE html>
<html>
<head>
  <title>Curalink AI</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6fb;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 30px;
    }

    input {
      width: 70%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 18px;
      border: none;
      background: teal;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      animation: fadeIn 0.5s ease-in-out;
    }

    .tabs button {
      margin-right: 10px;
      margin-top: 15px;
      background: #ddd;
      color: black;
    }

    .tabs button.active {
      background: teal;
      color: white;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Curalink AI</h1>

  <input id="query" placeholder="lung cancer treatment">
  <button onclick="search()">Search</button>

  <div class="tabs">
    <button onclick="setTab('all')" id="allBtn" class="active">All</button>
    <button onclick="setTab('papers')" id="papersBtn">Research Papers</button>
    <button onclick="setTab('trials')" id="trialsBtn">Clinical Trials</button>
  </div>

  <div id="loading" style="display:none;">Loading...</div>

  <div id="answer" class="card"></div>

  <div id="papersSection" class="card"></div>
  <div id="trialsSection" class="card"></div>
</div>

<script>
let currentTab = "all";

function setTab(tab) {
  currentTab = tab;

  document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
  document.getElementById(tab + "Btn").classList.add("active");

  render();
}

let globalData = null;

async function search() {
  const q = document.getElementById("query").value;

  document.getElementById("loading").style.display = "block";

  const res = await fetch(`https://curalink-backend-h2rw.onrender.com/search/all?q=${q}`);
  const data = await res.json();

  globalData = data;

  document.getElementById("loading").style.display = "none";

  render();
}

function render() {
  if (!globalData) return;

  document.getElementById("answer").innerText = globalData.answer;

  const papersDiv = document.getElementById("papersSection");
  const trialsDiv = document.getElementById("trialsSection");

  papersDiv.innerHTML = "<h3>Research Papers</h3>";
  trialsDiv.innerHTML = "<h3>Clinical Trials</h3>";

  globalData.papers.forEach(p => {
    papersDiv.innerHTML += `<p>• ${p.title} (${p.year})</p>`;
  });

  globalData.trials.forEach(t => {
    trialsDiv.innerHTML += `<p>• ${t.title} (${t.status})</p>`;
  });

  papersDiv.style.display = (currentTab === "papers" || currentTab === "all") ? "block" : "none";
  trialsDiv.style.display = (currentTab === "trials" || currentTab === "all") ? "block" : "none";
}
</script>

</body>
</html>
