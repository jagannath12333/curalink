<body>

<div class="container">

  <h1>Medical <span class="gradient">Research AI</span></h1>
  <p class="subtitle">Get insights from real research papers instantly</p>

  <div class="search-box">
    <input type="text" id="query" placeholder="Search disease (e.g. lung cancer)" />
    <button id="btn" onclick="search()">Search</button>
  </div>

  <div id="loading" class="loading" style="display:none;">
    AI is analyzing research... (3–8 sec)
  </div>

  <div id="answerCard" class="card" style="display:none;">
    <h2>AI Insights</h2>
    <div id="answer"></div>
  </div>

  <div id="papersCard" class="card" style="display:none;">
    <h2>Research Papers</h2>
    <ul id="papers"></ul>
  </div>

  <div class="footer">
    Built with OpenAlex + PubMed + AI
  </div>

</div>

<script>
async function search() {
  const query = document.getElementById("query").value.trim();
  const btn = document.getElementById("btn");

  const loading = document.getElementById("loading");
  const answerCard = document.getElementById("answerCard");
  const papersCard = document.getElementById("papersCard");

  if (!query) {
    alert("Please enter a query");
    return;
  }

  btn.disabled = true;
  loading.innerText = "AI is analyzing research... (3–8 sec)";
  loading.style.display = "block";
  answerCard.style.display = "none";
  papersCard.style.display = "none";

  try {
    const res = await fetch(`https://curalink-backend-h2rw.onrender.com/search/all?q=${encodeURIComponent(query)}`);
    const data = await res.json();

    document.getElementById("answer").innerHTML =
      data.answer.replace(/\n/g, "<br>");

    const papersList = document.getElementById("papers");
    papersList.innerHTML = "";

    data.papers.forEach(p => {
      const li = document.createElement("li");
      li.innerHTML = `
        <b>${p.title}</b> (${p.year}) - ${p.source}
        ${p.url ? `<br><a href="${p.url}" target="_blank">View Paper</a>` : ""}
      `;
      papersList.appendChild(li);
    });

    loading.style.display = "none";
    answerCard.style.display = "block";
    papersCard.style.display = "block";
    btn.disabled = false;

  } catch (error) {
    loading.innerText = "Error fetching data. Please try again.";
    btn.disabled = false;
  }
}
</script>

</body>
</html>
