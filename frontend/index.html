<!DOCTYPE html>
<html>
<head>
  <title>Medical Research AI</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6fb;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 30px;
    }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Medical Research AI</h1>

  <input id="query" placeholder="lung cancer treatment">
  <button onclick="search()">Search</button>

  <div id="loading" style="display:none;">Loading...</div>

  <div id="answer" class="card"></div>
  <ul id="papers"></ul>
</div>

<script>
async function search() {
  const q = document.getElementById("query").value;

  document.getElementById("loading").style.display = "block";

  const res = await fetch(`https://curalink-backend-h2rw.onrender.com/search/all?q=${q}`);
  const data = await res.json();

  document.getElementById("loading").style.display = "none";

  document.getElementById("answer").innerText = data.answer;

  const list = document.getElementById("papers");
  list.innerHTML = "";

  data.papers.forEach(p => {
    const li = document.createElement("li");
    li.innerText = `${p.title} (${p.year})`;
    list.appendChild(li);
  });
}
</script>

</body>
</html>
